name: Precompile Apple

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  precompile-apple:
    name: Precompile Apple
    runs-on: macos-latest

    defaults:
      run:
        shell: bash
        working-directory: cargokit/build_tool

    env:
      REPOSITORY_SLUG: Matkurban/xue_hua_app_badge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1.7.2

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Dart dependencies
        run: dart pub get

      - name: Precompile macOS and iOS artifacts
        run: >
          dart run build_tool precompile-binaries
          --manifest-dir=../../rust
          --repository=$REPOSITORY_SLUG
          --target=x86_64-apple-darwin
          --target=aarch64-apple-darwin
          --target=aarch64-apple-ios
          --target=aarch64-apple-ios-sim
          --target=x86_64-apple-ios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
