name: Precompile Binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  precompile:
    name: Precompile (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        shell: bash
        working-directory: cargokit/build_tool

    env:
      REPOSITORY_SLUG: Matkurban/xue_hua_app_badge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Java
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install GTK
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Resolve Dart dependencies
        run: dart pub get

      - name: Precompile macOS, iOS, or Windows artifacts
        if: matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        run: dart run build_tool precompile-binaries --manifest-dir=../../rust --repository=$REPOSITORY_SLUG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}

      - name: Precompile Linux and Android artifacts
        if: matrix.os == 'ubuntu-latest'
        run: dart run build_tool precompile-binaries --manifest-dir=../../rust --repository=$REPOSITORY_SLUG --android-sdk-location=/usr/local/lib/android/sdk --android-ndk-version=24.0.8215888 --android-min-sdk-version=19
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}

  verify:
    name: Verify published binaries
    runs-on: ubuntu-latest
    needs: precompile
    permissions:
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: cargokit/build_tool

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Resolve Dart dependencies
        run: dart pub get

      - name: Verify published binaries
        run: dart run build_tool verify-binaries --manifest-dir=../../rust
