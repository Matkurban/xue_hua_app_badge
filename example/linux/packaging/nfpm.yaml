name: xue-hua-app-badge-example
arch: amd64
platform: linux
version: "1.0.0"
section: utility
priority: optional
maintainer: "xue_hua_app_badge <dev@localhost>"
description: |
  Example app for testing xue_hua_app_badge on Linux.
depends:
  - libgtk-3-0
  - libglib2.0-0
  - libdbus-1-3
contents:
  - src: ../../build/linux/x64/release/bundle/
    dst: /usr/lib/xue_hua_app_badge_example/
    type: tree
  - src: com.example.xue_hua_app_badge.desktop
    dst: /usr/share/applications/com.example.xue_hua_app_badge.desktop
  - src: icons/hicolor/256x256/apps/com.example.xue_hua_app_badge.png
    dst: /usr/share/icons/hicolor/256x256/apps/com.example.xue_hua_app_badge.png
