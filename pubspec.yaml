name: xue_hua_app_badge
description: "A new Flutter FFI plugin project."
version: 0.0.1
homepage: https://github.com/Matkurban/xue_hua_app_badge
repository: https://github.com/Matkurban/xue_hua_app_badge

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.flutter_rust_bridge.xue_hua_app_badge
        pluginClass: XueHuaAppBadgePlugin
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
