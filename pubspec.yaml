name: xue_hua_app_badge
description: "Cross-platform Flutter app badge plugin. Android, iOS, and macOS use native MethodChannel; Windows and Linux use a Rust core via flutter_rust_bridge."
version: 0.0.1
homepage: https://github.com/Matkurban/xue_hua_app_badge
repository: https://github.com/Matkurban/xue_hua_app_badge

environment:
  sdk: ^3.11.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.flutter_rust_bridge.xue_hua_app_badge
        pluginClass: XueHuaAppBadgePlugin
      ios:
        pluginClass: XueHuaAppBadgePlugin
      macos:
        pluginClass: XueHuaAppBadgePlugin
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
